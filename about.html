<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | About Us</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-surface: #ffffff;
            --border-elegant: rgba(15, 23, 42, 0.06);
            --text-heading: #0f172a;
            --text-body: #475569;
            --text-muted: #64748b;
            --accent-lux: #312e81;
            --accent-emerald: #059669;
            --accent-rose: #be123c;
            --glow-lux: rgba(49, 46, 129, 0.04);
            --light-emerald: rgba(5, 150, 105, 0.05);
            --light-rose: rgba(190, 18, 60, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            line-height: 1.7;
            background-image: 
                radial-gradient(circle at top right, rgba(49, 46, 129, 0.03), transparent 600px),
                radial-gradient(circle at bottom left, rgba(5, 150, 105, 0.02), transparent 600px);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid var(--border-elegant);
            padding: 20px 24px;
            z-index: 1000;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text-heading);
            text-decoration: none;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .nav-logo span {
            color: var(--accent-lux);
            font-weight: 400;
            margin-left: 2px;
        }

        .nav-right-block {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links {
            display: flex;
            gap: 6px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.88rem;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-links a.active, .nav-links a:hover {
            color: var(--text-heading);
            background-color: rgba(15, 23, 42, 0.04);
        }

        .nav-links a.active {
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.05);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-lux);
            font-weight: 700;
            margin-bottom: 14px;
            display: inline-block;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-heading);
            letter-spacing: -1px;
            line-height: 1.15;
            margin-bottom: 24px;
        }

        .lead-text {
            font-size: 1.2rem;
            color: var(--text-body);
            max-width: 760px;
            margin: 0 auto 30px auto;
        }

        .disclaimer-box {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-elegant);
            border-left: 3px solid var(--text-muted);
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 0.88rem;
            color: var(--text-muted);
            text-align: left;
            max-width: 760px;
            margin: 0 auto;
            box-shadow: 0 4px 20px var(--glow-lux);
        }

        h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-heading);
            letter-spacing: -0.5px;
            margin-top: 60px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-elegant);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 30px var(--glow-lux);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
            border-color: rgba(49, 46, 129, 0.15);
        }

        .card-icon {
            font-size: 1.5rem;
            margin-bottom: 14px;
            display: inline-block;
        }

        .card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-body);
        }

        .list-premium {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .list-premium li {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-elegant);
            padding: 20px 24px;
            border-radius: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .list-premium strong {
            color: var(--text-heading);
            font-weight: 600;
        }

        /* Clickable Cohort Module Layout */
        .cohort-anchor {
            text-decoration: none;
            display: block;
            margin-top: 50px;
        }

        .cohort-status-banner {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-elegant);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px var(--glow-lux);
            transition: all 0.3s ease;
        }

        .cohort-anchor:hover .cohort-status-banner {
            transform: translateY(-3px);
            box-shadow: 0 16px 50px rgba(49, 46, 129, 0.08);
        }

        .status-badge {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 16px;
        }

        .status-badge.active {
            background-color: var(--light-emerald);
            color: var(--accent-emerald);
            border: 1px solid rgba(5, 150, 105, 0.15);
        }

        .status-badge.locked {
            background-color: var(--light-rose);
            color: var(--accent-rose);
            border: 1px solid rgba(190, 18, 60, 0.15);
        }

        .cohort-status-banner h3 {
            font-size: 1.4rem;
            color: var(--text-heading);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .cohort-status-banner p {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 580px;
            margin: 0 auto;
        }

        .action-indicator {
            margin-top: 16px;
            font-size: 0.88rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: gap 0.2s ease;
        }

        .cohort-anchor:hover .action-indicator {
            gap: 10px;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border-elegant);
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 100px;
        }

        footer a {
            color: var(--accent-lux);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.25rem; }
            .container { padding: 40px 20px; }
            .nav-right-block { gap: 15px; }
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="index.html" class="nav-logo">SPONA<span>Intl.</span></a>
            <div class="nav-right-block">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html" class="active">About Us</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div id="google_translate_element"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="section-header">
            <span class="section-subtitle">Who We Are</span>
