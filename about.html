<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | About Us</title>
    <style>
        :root {
            --bg-main: #070a13;
            --bg-card: rgba(19, 27, 46, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-emerald: #10b981;
            --accent-indigo: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --light-blue: rgba(16, 185, 129, 0.1);
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            line-height: 1.6; 
            background-image: 
                radial-gradient(circle at 90% 10%, rgba(99, 102, 241, 0.12), transparent 600px),
                radial-gradient(circle at 10% 80%, rgba(16, 185, 129, 0.06), transparent 600px);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }
        nav { 
            position: sticky; 
            top: 0; 
            background-color: rgba(7, 10, 19, 0.75); 
            border-bottom: 1px solid var(--border-color); 
            padding: 18px 20px; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        .nav-logo { 
            font-weight: 800; 
            font-size: 1.4rem; 
            color: #ffffff; 
            text-decoration: none; 
            letter-spacing: -0.5px; 
        }
        .nav-logo span { 
            color: var(--accent-indigo); 
        }
        .nav-right-block { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
        }
        .nav-links { 
            display: flex; 
            gap: 6px; 
            list-style: none; 
        }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 600; 
            font-size: 0.9rem; 
            padding: 10px 18px; 
            border-radius: 10px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-links a.active, .nav-links a:hover { 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.04); 
        }
        .nav-links a.active { 
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            background-color: rgba(99, 102, 241, 0.1);
            color: #ffffff;
        }
        
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 80px 20px; 
        }
        
        /* Premium Hero Intro Layout */
        .intro-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            align-items: center;
            margin-bottom: 90px;
        }
        @media (max-width: 850px) {
            .intro-grid { grid-template-columns: 1fr; gap: 30px; text-align: center; }
            .badge-wrapper { justify-content: center; }
        }
        
        .badge-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .badge { 
            font-size: 0.75rem; 
            font-weight: 700; 
            padding: 6px 14px; 
            border-radius: 20px; 
            background-color: rgba(99, 102, 241, 0.1); 
            color: var(--accent-indigo); 
            border: 1px solid rgba(99, 102, 241, 0.2); 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge.emerald {
            background-color: var(--light-blue);
            color: var(--accent-emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        h1 { 
            font-size: 3.2rem; 
            font-weight: 800; 
            margin-bottom: 24px; 
            letter-spacing: -1.5px; 
            line-height: 1.15; 
            color: #ffffff; 
        }
        h1 span {
            background: linear-gradient(to right, #ffffff, var(--accent-indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lead-text { 
            color: var(--text-secondary); 
            font-size: 1.2rem; 
            line-height: 1.7;
            margin-bottom: 20px;
        }

        /* Medical Disclaimer Overlay */
        .disclaimer-card {
            background: rgba(239, 68, 68, 0.03);
            border: 1px solid rgba(239, 68, 68, 0.15);
            padding: 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #fca5a5;
            line-height: 1.6;
        }

        /* Abstract Premium Graphic Element */
        .visual-graphic {
            position: relative;
            height: 320px;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }
        .visual-graphic::before {
            content: "🧬";
            font-size: 6rem;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--accent-indigo));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Section Headings */
        .section-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Bento / Asymmetric Features Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 90px;
        }
        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
        }
        
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 35px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.1);
        }
        .glass-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }
        .glass-card p {
            color: var(--text-secondary);
            font-size: 0.98rem;
            line-height: 1.6;
        }
        .card-icon {
            font-size: 2rem;
            margin-bottom: 20px;
            display: block;
        }

        /* Performance Block - Columns Layout */
        .split-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 50px;
        }
        @media (max-width: 850px) {
            .split-section { grid-template-columns: 1fr; }
        }

        .list-item-premium {
            background: rgba(255,255,255,0.01);
            border-left: 3px solid var(--accent-indigo);
            padding: 20px 25px;
            border-radius: 0 16px 16px 0;
            margin-bottom: 18px;
            border-top: 1px solid rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.02);
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .list-item-premium.emerald {
            border-left-color: var(--accent-emerald);
        }
        .list-item-premium strong {
            display: block;
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .list-item-premium p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        footer { 
            text-align: center; 
            padding: 40px 0; 
            border-top: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            margin-top: 80px; 
        }
        footer a { 
            color: var(--accent-indigo); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s ease; 
        }
        footer a:hover { 
            color: #ffffff; 
            text-decoration: underline; 
        }
    </style>
</head>
