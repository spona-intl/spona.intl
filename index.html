<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Home</title>
    <!-- Premium Fonts Integration -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #060913; 
            --bg-card: rgba(19, 27, 46, 0.4); 
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc; 
            --text-secondary: #94a3b8;
            --accent-emerald: #10b981; 
            --accent-indigo: #818cf8; 
            --accent-glow: rgba(129, 140, 248, 0.15);
            --light-blue: rgba(16, 185, 129, 0.1);
        }
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            line-height: 1.6; 
            background-image: 
                radial-gradient(circle at top right, rgba(129, 140, 248, 0.12), transparent 600px),
                radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 500px);
            background-attachment: fixed;
            overflow-x: hidden;
        }
        nav { 
            position: sticky; 
            top: 0; 
            background-color: rgba(6, 9, 19, 0.7); 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 20px; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }
        .nav-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        .nav-logo { 
            font-family: 'Syne', sans-serif;
            font-weight: 800; 
            font-size: 1.4rem; 
            color: #ffffff; 
            text-decoration: none; 
            letter-spacing: -0.5px; 
        }
        .nav-logo span { 
            color: var(--accent-indigo); 
        }
        .nav-right-block { 
            display: flex; 
            align-items: center; 
            gap: 25px; 
        }
        .nav-links { 
            display: flex; 
            gap: 4px; 
            list-style: none; 
        }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 500; 
            font-size: 0.9rem; 
            padding: 8px 16px; 
            border-radius: 8px; 
            transition: all 0.3s ease; 
        }
        .nav-links a.active, .nav-links a:hover { 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.05); 
        }
        .nav-links a.active { 
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1); 
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 80px 20px; 
        }
        .hero { 
            text-align: center; 
            padding: 100px 20px 80px 20px; 
            margin-bottom: 60px; 
            position: relative;
        }
        .logo-subtitle { 
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: var(--accent-emerald); 
            font-weight: 700; 
            margin-bottom: 24px; 
        }
        h1 { 
            font-family: 'Syne', sans-serif;
            font-size: 3.8rem; 
            font-weight: 800; 
            margin-bottom: 24px; 
            letter-spacing: -2px; 
            line-height: 1.1; 
            color: #ffffff; 
            background: linear-gradient(135deg, #ffffff 60%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p { 
            font-size: 1.25rem; 
            color: var(--text-secondary); 
            max-width: 680px; 
            margin: 0 auto; 
            font-weight: 400;
        }
        .embedded-form-wrapper { 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            overflow: hidden; 
            background-color: rgba(19, 27, 46, 0.2); 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .form-header-bar { 
            padding: 50px; 
            border-bottom: 1px solid var(--border-color); 
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
        }
        .badge { 
            font-size: 0.75rem; 
            font-weight: 600; 
            padding: 6px 14px; 
            border-radius: 20px; 
            background-color: var(--light-blue); 
            color: var(--accent-emerald); 
            border: 1px solid rgba(16, 185, 129, 0.2); 
            display: inline-block; 
            letter-spacing: 0.5px; 
        }
        .logistics-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px; 
            text-align: left; 
        }
        .metric-card { 
            background: rgba(6, 9, 19, 0.4); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .metric-card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(129, 140, 248, 0.4); 
            box-shadow: 0 15px 30px var(--accent-glow); 
        }
        .metric-card strong { 
            color: var(--accent-indigo); 
            display: block; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 8px; 
        }
        .metric-card span { 
            color: #ffffff; 
            font-size: 1.1rem; 
            font-weight: 600; 
        }
        /* Elite Bento Grid Layout Strategy */
        .roles-bento-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr);
            gap: 16px; 
            text-align: left; 
        }
        .role-card { 
            grid-column: span 2;
            border: 1px solid var(--border-color); 
            padding: 24px; 
            border-radius: 16px; 
            background-color: rgba(6, 9, 19, 0.2); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .role-card.wide {
            grid-column: span 3;
        }
        .role-card:hover { 
            border-color: var(--accent-indigo); 
            background-color: rgba(129, 140, 248, 0.03); 
            transform: translateY(-2px); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); 
        }
        .role-card .icon { 
            font-size: 1.8rem; 
            display: block; 
            margin-bottom: 12px; 
        }
        .role-card strong { 
            font-size: 1.05rem; 
            color: #ffffff; 
            display: block; 
            font-weight: 600; 
            margin-bottom: 6px;
        }
        .role-card p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2.6rem; }
            .roles-bento-grid { grid-template-columns: 1fr; }
            .role-card, .role-card.wide { grid-column: span 1; }
            .form-header-bar { padding: 30px; }
        }
        footer { 
            text-align: center; 
            padding: 40px 0; 
            border-top: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            margin-top: 100px; 
        }
        footer a { 
            color: var(--accent-indigo); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s ease; 
        }
        footer a:hover { 
            color: #ffffff; 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="index.html" class="nav-logo">SPONA<span>Intl.</span></a>
            <div class="nav-right-block">
                <ul class="nav-links">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="events.html">Events</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div id="google_translate_element"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="logo-subtitle">SPONA International</div>
            <h1>The Student-led Peer Outreach and Neuroscience Association</h1>
            <p>Bridging the gap between global youth collaboration and the cutting-edge world of brain science.</p>
        </div>

        <div id="dynamic-cohort-section">
            <div class="embedded-form-wrapper">
                <div class="form-header-bar">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px;">
                        <span class="badge">Admissions Active</span>
