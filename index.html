<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONA Intl. | Home</title>
    <style>
        :root {
            --bg-main: #060913; 
            --bg-card: rgba(19, 27, 46, 0.4); 
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #f8fafc; 
            --text-secondary: #94a3b8;
            --accent-emerald: #10b981; 
            --accent-indigo: #818cf8; 
            --accent-glow: rgba(99, 102, 241, 0.25);
            --light-blue: rgba(16, 185, 129, 0.08);
            --glass-bg: rgba(11, 15, 25, 0.6);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-primary); 
            line-height: 1.6; 
            background-image: 
                radial-gradient(circle at 80% 10%, rgba(99, 102, 241, 0.12), transparent 600px),
                radial-gradient(circle at 15% 80%, rgba(16, 185, 129, 0.06), transparent 500px);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* High-End Glassmorphism Navbar */
        nav { 
            position: sticky; 
            top: 0; 
            background-color: rgba(6, 9, 19, 0.7); 
            border-bottom: 1px solid var(--border-color); 
            padding: 16px 24px; 
            z-index: 1000; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
        }

        .nav-container { 
            max-width: 1100px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }

        .nav-logo { 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: #ffffff; 
            text-decoration: none; 
            letter-spacing: -0.8px; 
            display: flex;
            align-items: center;
        }

        .nav-logo span { 
            color: var(--accent-indigo); 
            font-weight: 400;
            margin-left: 2px;
        }

        .nav-right-block { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }

        .nav-links { 
            display: flex; 
            gap: 4px; 
            list-style: none; 
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--text-secondary); 
            font-weight: 500; 
            font-size: 0.88rem; 
            padding: 8px 16px; 
            border-radius: 8px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
        }

        .nav-links a.active, .nav-links a:hover { 
            color: #ffffff; 
            background-color: rgba(255, 255, 255, 0.04); 
        }

        .nav-links a.active { 
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08); 
            background-color: rgba(99, 102, 241, 0.08);
            color: var(--accent-indigo);
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 80px 24px; 
        }

        /* Editorial Hero Styling */
        .hero { 
            text-align: center; 
            padding: 100px 24px; 
            margin-bottom: 60px; 
            position: relative;
        }

        .logo-subtitle { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            color: var(--accent-indigo); 
            font-weight: 700; 
            margin-bottom: 24px; 
            background: linear-gradient(90deg, var(--accent-indigo), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 { 
            font-size: 3.6rem; 
            font-weight: 900; 
            margin-bottom: 24px; 
            letter-spacing: -1.5px; 
            line-height: 1.15; 
            color: #ffffff; 
            max-width: 850px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero p { 
            font-size: 1.25rem; 
            color: var(--text-secondary); 
            max-width: 640px; 
            margin: 0 auto; 
            font-weight: 400;
        }

        /* Glassmorphism Embedded Module Container */
        .embedded-form-wrapper { 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            overflow: hidden; 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.4),
                0 0 100px rgba(99, 102, 241, 0.04); 
        }

        .form-header-bar { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, transparent 100%); 
            padding: 50px; 
            border-bottom: 1px solid var(--border-color); 
        }

        .badge { 
            font-size: 0.72rem; 
            font-weight: 700; 
            padding: 6px 14px; 
            border-radius: 30px; 
            background-color: var(--light-blue); 
            color: var(--accent-emerald); 
            border: 1px solid rgba(16, 185, 129, 0.15); 
            display: inline-block; 
            letter-spacing: 0.8px; 
            text-transform: uppercase;
        }

        .badge-alt {
            background-color: rgba(99, 102, 241, 0.08); 
            color: var(--accent-indigo); 
            border-color: rgba(99, 102, 241, 0.15);
        }

        /* Asymmetric Layout Upgrades */
        .logistics-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-bottom: 50px; 
            text-align: left; 
        }

        .metric-card { 
            background: rgba(255, 255, 255, 0.02); 
            padding: 24px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        .metric-card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(99, 102, 241, 0.3); 
            background: rgba(99, 102, 241, 0.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); 
        }

        .metric-card strong { 
            color: var(--text-secondary); 
            display: block; 
            font-size: 0.72rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 8px; 
        }

        .metric-card span { 
            color: #ffffff; 
            font-size: 1.15rem; 
            font-weight: 600; 
            letter-spacing: -0.3px;
        }

        /* High-End Bento Box Team Layout */
        .roles-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr);
            gap: 16px; 
            text-align: left; 
        }

        .role-card { 
            grid-column: span 2;
            border: 1px solid var(--border-color); 
            padding: 24px; 
            border-radius: 16px; 
            background-color: rgba(255, 255, 255, 0.01); 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        /* Asymmetric grid tailoring for high-end structure */
        .role-card:nth-child(4) { grid-column: span 3; }
        .role-card:nth-child(5) { grid-column: span 3; }

        .role-card:hover { 
            border-color: rgba(99, 102, 241, 0.4); 
            background-color: rgba(99, 102, 241, 0.03); 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.08); 
        }

        .role-card span { 
            font-size: 1.6rem; 
            display: block; 
            margin-bottom: 12px; 
            opacity: 0.9;
        }

        .role-card strong { 
            font-size: 1rem; 
            color: #ffffff; 
            display: block; 
            font-weight: 600; 
            letter-spacing: -0.2px;
        }

        iframe {
            background-color: transparent;
            display: block;
            border: none;
            filter: invert(0.9) hue-rotate(180deg); /* Dark-mode matching mask injection */
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }
        iframe:hover {
            opacity: 1;
        }

        footer { 
            text-align: center; 
            padding: 40px 0; 
            border-top: 1px solid var(--border-color); 
            color: var(--text-secondary); 
            font-size: 0.85rem; 
            margin-top: 100px; 
        }

        footer a { 
            color: var(--accent-indigo); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s ease; 
        }

        footer a:hover { 
            color: #ffffff; 
            text-decoration: underline; 
        }

        /* Responsive Breakpoints */
        @media (max-width: 900px) {
            .roles-grid { grid-template-columns: repeat(2, 1fr); }
            .role-card { grid-column: span 1 !important; }
            h1 { font-size: 2.6rem; }
        }
        @media (max-width: 600px) {
            .roles-grid { grid-template-columns: 1fr; }
            .form-header-bar { padding: 24px; }
            h1 { font-size: 2.1rem; }
        }
    </style>
</head>
<body>

        <div class="nav-container">
            <a href="index.html" class="nav-logo">SPONA<span>Intl.</span></a>
            <div class="nav-right-block">
                <ul class="nav-links">
